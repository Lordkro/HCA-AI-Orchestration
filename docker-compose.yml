# ============================================================
# HCA Orchestration - Docker Compose
# ============================================================
# Autonomous AI development team powered by Ollama
#
# Hardware profiles:
#   Default (CPU)         – docker compose up
#   NVIDIA GPU            – docker compose --profile nvidia up
#   AMD ROCm GPU          – docker compose --profile rocm up    (requires compatible ROCm)
#   Vulkan GPU (any)      – docker compose --profile vulkan up (recommended fallback)
#   Apple Silicon (Metal) – docker compose --profile metal up
#   One-time model pull   – docker compose --profile setup run model-puller
#
# Environment variables (OLLAMA_IMAGE, OLLAMA_TAG, etc.) can be
# overridden in .env or via the shell.
# ============================================================

services:
  # --------------------------------------------------------
  # Ollama – Local LLM inference
  # --------------------------------------------------------
  # The default profile ('cpu') uses the standard ollama/ollama
  # image which runs on CPU or automatically detects an NVIDIA GPU.
  #
  # For dedicated GPU profiles use:
  #   docker compose --profile nvidia up   (NVIDIA CUDA)
  #   docker compose --profile rocm up     (AMD ROCm)
  #   docker compose --profile vulkan up   (any GPU with Vulkan)
  #   docker compose --profile metal up    (Apple Silicon Metal)
  #
  # Only ONE Ollama service should be active at a time.
  # --------------------------------------------------------
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama}:${OLLAMA_TAG:-latest}
    container_name: hca-ollama
    init: true
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
      - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT:-10m}
      - OLLAMA_GPU_OVERHEAD=${OLLAMA_GPU_OVERHEAD:-3221225472}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
    # Default CPU profile – active when no --profile flag is given
    profiles:
      - cpu

  # --------------------------------------------------------
  # NVIDIA GPU – activates via --profile nvidia
  # --------------------------------------------------------
  ollama-nvidia:
    image: ${OLLAMA_IMAGE_NVIDIA:-ollama/ollama}:${OLLAMA_TAG_NVIDIA:-latest}
    container_name: hca-ollama
    init: true
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - nvidia
    networks:
      default:
        aliases:
          - ollama
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: ${NVIDIA_VISIBLE_DEVICES:-all}
              capabilities: [gpu]
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT:-10m}
      - OLLAMA_GPU_OVERHEAD=${OLLAMA_GPU_OVERHEAD:-2147483648}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - CUDA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # Apple Silicon (Metal) – activates via --profile metal
  # --------------------------------------------------------
  ollama-metal:
    image: ${OLLAMA_IMAGE:-ollama/ollama}:${OLLAMA_TAG:-latest}
    container_name: hca-ollama
    init: true
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - metal
    platform: linux/arm64
    networks:
      default:
        aliases:
          - ollama
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT:-10m}
      - OLLAMA_GPU_OVERHEAD=${OLLAMA_GPU_OVERHEAD:-2147483648}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # AMD ROCm GPU – activates via --profile rocm
  # --------------------------------------------------------
  ollama-rocm:
    image: ${OLLAMA_IMAGE_ROCM:-ollama/ollama:rocm}
    container_name: hca-ollama
    init: true
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - rocm
    networks:
      default:
        aliases:
          - ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "39"    # video
      - "105"   # render
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT:-10m}
      - OLLAMA_GPU_OVERHEAD=${OLLAMA_GPU_OVERHEAD:-2147483648}
      - ROCR_VISIBLE_DEVICES=${ROCR_VISIBLE_DEVICES:-0}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-10.3.0}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # Vulkan GPU – activates via --profile vulkan
  # --------------------------------------------------------
  # For any GPU with Vulkan support (AMD, Intel, NVIDIA with
  # open-source drivers).  Uses Vulkan via /dev/dri — no ROCm
  # or CUDA dependency.  This is the recommended fallback when
  # the dedicated ROCm / CUDA profiles have compatibility issues.
  #
  # Usage:
  #   docker compose --profile vulkan up
  # --------------------------------------------------------
  ollama-vulkan:
    image: ${OLLAMA_IMAGE:-ollama/ollama}:${OLLAMA_TAG:-latest}
    container_name: hca-ollama
    init: true
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - vulkan
    networks:
      default:
        aliases:
          - ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "105"   # render (DRM / Vulkan access)
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT:-10m}
      - OLLAMA_GPU_OVERHEAD=${OLLAMA_GPU_OVERHEAD:-2147483648}
      - OLLAMA_LLM_LIBRARY=vulkan
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------
  # Redis – Message bus for agent communication
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hca-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # HCA Orchestrator – Agents + API in one service
  # --------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hca-orchestrator
    init: true
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/workspace
      - ./data:/app/data
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # --------------------------------------------------------
  # Model Puller – One-time setup to pull required models
  # --------------------------------------------------------
  model-puller:
    image: curlimages/curl:latest
    container_name: hca-model-puller
    profiles:
      - setup
    depends_on:
      redis:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Waiting for Ollama to be ready ==="
        for i in $$(seq 1 30); do
          if curl -sS http://ollama:11434/api/tags > /dev/null 2>&1; then
            echo "Ollama is ready"
            break
          fi
          echo "Waiting for Ollama... ($$i/30)"
          sleep 2
        done
        echo "=== Pulling configured models ==="
        for model in $${OLLAMA_MODELS_TO_PULL:-qwen3:8b qwen2.5-coder:7b}; do
          echo "Pulling $$model ..."
          curl -s -S -o /dev/null -w "%{http_code}" http://ollama:11434/api/pull -d "{\"name\": \"$$model\"}"
          echo ""
        done
        echo "=== All models pulled successfully ==="

volumes:
  ollama_data:
  redis_data:
